<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH SMS Sender - Virtual Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .shimmer {
            background: linear-gradient(90deg, #2563eb 0%, #3b82f6 50%, #2563eb 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md glass-morphism rounded-[2rem] shadow-2xl overflow-hidden border border-white">
        <!-- Header -->
        <div class="bg-blue-600 p-8 text-white relative">
            <div class="absolute top-4 right-4 bg-blue-500/30 px-2 py-1 rounded text-[10px] font-bold tracking-tighter uppercase">Standalone Mode</div>
            <h1 class="text-2xl font-extrabold tracking-tight">PH SMS Sender</h1>
            <p class="text-blue-100 text-sm mt-1 opacity-90">Local Transmission Protocol</p>
        </div>

        <!-- Form -->
        <div class="p-8 space-y-6">
            <!-- Recipient Input -->
            <div class="space-y-2">
                <div class="flex justify-between items-center">
                    <label for="phone" class="text-sm font-bold text-gray-800 uppercase tracking-wide">Recipient</label>
                    <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">PHILIPPINES (+63)</span>
                </div>
                <div class="relative flex items-center group">
                    <span class="absolute left-4 text-gray-400 font-bold border-r pr-3 border-gray-200 group-focus-within:text-blue-600 group-focus-within:border-blue-200 transition-colors">
                        +63
                    </span>
                    <input 
                        type="tel" 
                        id="phone" 
                        placeholder="9XX XXX XXXX" 
                        maxlength="10"
                        class="w-full pl-16 pr-4 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all text-xl font-medium tracking-widest placeholder:text-gray-300 shadow-sm"
                    >
                </div>
            </div>

            <!-- Message Box -->
            <div class="space-y-2">
                <label for="message" class="text-sm font-bold text-gray-800 uppercase tracking-wide">Message Content</label>
                <textarea 
                    id="message" 
                    rows="4" 
                    placeholder="Enter your message here..." 
                    class="w-full p-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all resize-none shadow-sm text-gray-700 leading-relaxed"
                ></textarea>
                <div class="flex justify-between items-center px-1">
                    <div class="flex space-x-3">
                        <span id="char-count" class="text-[11px] font-bold text-gray-400 uppercase">0 / 160</span>
                        <span id="segments" class="text-[11px] font-bold text-gray-400 uppercase border-l pl-3">1 SMS</span>
                    </div>
                    <span class="text-[10px] font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-full uppercase">Offline Ready</span>
                </div>
            </div>

            <!-- Send Button -->
            <div class="pt-2">
                <button 
                    id="send-btn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-200 transform active:scale-[0.97] transition-all flex items-center justify-center space-x-3 text-lg uppercase tracking-wider"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                    <span>Send Message</span>
                </button>
            </div>
        </div>

        <!-- System Status -->
        <div class="bg-gray-50 p-4 border-t border-gray-100">
            <div class="flex items-center justify-center space-x-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">System Operational: No API Required</span>
            </div>
        </div>
    </div>

    <!-- Notification Modal -->
    <div id="modal" class="fixed inset-0 bg-gray-900/60 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full text-center shadow-2xl scale-95 transition-transform duration-300">
            <div id="modal-icon" class="mb-6 flex justify-center"></div>
            <h3 id="modal-title" class="text-2xl font-black text-gray-900 mb-2"></h3>
            <p id="modal-text" class="text-gray-600 mb-8 leading-relaxed"></p>
            <button onclick="closeModal()" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold uppercase tracking-widest hover:bg-black transition-colors">Confirm</button>
        </div>
    </div>

    <script>
        const phoneInput = document.getElementById('phone');
        const messageInput = document.getElementById('message');
        const charCount = document.getElementById('char-count');
        const segmentCount = document.getElementById('segments');
        const sendBtn = document.getElementById('send-btn');
        const modal = document.getElementById('modal');

        // Input Sanitization
        phoneInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        // Counter Logic
        messageInput.addEventListener('input', () => {
            const length = messageInput.value.length;
            charCount.textContent = `${length} / 160`;
            const segments = length === 0 ? 1 : Math.ceil(length / 160);
            segmentCount.textContent = `${segments} SMS`;
            
            if (length > 160) {
                charCount.classList.replace('text-gray-400', 'text-orange-500');
            } else {
                charCount.classList.replace('text-orange-500', 'text-gray-400');
            }
        });

        // Standalone Send Logic
        sendBtn.addEventListener('click', async () => {
            const phone = phoneInput.value;
            const msg = messageInput.value.trim();

            // Validation
            if (phone.length !== 10 || !phone.startsWith('9')) {
                showModal('Routing Error', 'Enter a valid 10-digit PH number (e.g., 9171234567).', 'error');
                return;
            }

            if (msg === '') {
                showModal('Content Missing', 'Please enter the message you wish to transmit.', 'error');
                return;
            }

            // Initiation
            setLoadingState(true);

            // Simulate immediate local transmission
            setTimeout(() => {
                showModal('Sent Successfully', `Message transmitted to +63 ${phone} locally. No external API was used.`, 'success');
                resetForm();
                setLoadingState(false);
            }, 1200);
        });

        function setLoadingState(isLoading) {
            if (isLoading) {
                sendBtn.disabled = true;
                sendBtn.classList.add('shimmer', 'opacity-80');
                sendBtn.innerHTML = '<span>Transmitting...</span>';
            } else {
                sendBtn.disabled = false;
                sendBtn.classList.remove('shimmer', 'opacity-80');
                sendBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                    <span>Send Message</span>
                `;
            }
        }

        function resetForm() {
            messageInput.value = '';
            phoneInput.value = '';
            charCount.textContent = '0 / 160';
            segmentCount.textContent = '1 SMS';
        }

        function showModal(title, text, type) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-text').textContent = text;
            const iconWrap = document.getElementById('modal-icon');
            const modalBox = modal.querySelector('div');
            
            modalBox.classList.remove('scale-100');
            modalBox.classList.add('scale-95');

            if (type === 'success') {
                iconWrap.innerHTML = `
                    <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center border-4 border-white shadow-inner">
                        <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                        </svg>
                    </div>`;
            } else {
                iconWrap.innerHTML = `
                    <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center border-4 border-white shadow-inner">
                        <svg class="w-12 h-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </div>`;
            }
            
            modal.style.display = 'flex';
            setTimeout(() => modalBox.classList.replace('scale-95', 'scale-100'), 10);
        }

        function closeModal() {
            modal.style.display = 'none';
        }
    </script>
</body>
</html>
